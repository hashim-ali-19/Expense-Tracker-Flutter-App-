name: penny_track
description: Penny Track — a local-first Flutter expense tracker app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State management
  provider: ^6.1.2

  # Category breakdown chart (bonus feature)
  fl_chart: ^0.68.0

  # Date formatting
  intl: ^0.19.0

  # Unique IDs for expenses
  uuid: ^4.4.0

  # Bold, modern typography (Rubik / Inter / Space Grotesk)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
